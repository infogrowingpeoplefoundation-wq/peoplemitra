<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Join GRPF - Member Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Khand:wght@500&display=swap" rel="stylesheet">
    <style>body { font-family: 'Khand', sans-serif; }</style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <h2 class="text-3xl font-bold text-center text-red-600 mb-6 uppercase">GRPF Registration</h2>
        <form id="regForm" class="space-y-4">
            <input type="text" id="regName" placeholder="Pura Naam" class="w-full p-3 border rounded-lg" required>
            <input type="email" id="regEmail" placeholder="Email Address" class="w-full p-3 border rounded-lg" required>
            <input type="password" id="regPass" placeholder="Password" class="w-full p-3 border rounded-lg" required>
            
            <label class="block font-bold text-gray-700">Account Type:</label>
            <select id="regRole" class="w-full p-3 border rounded-lg bg-gray-50">
                <option value="normal">Normal User (Citizen)</option>
                <option value="social_worker">Social Worker</option>
                <option value="ngo">NGO Member</option>
            </select>

            <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg font-bold text-lg hover:bg-red-700">CREATE ACCOUNT</button>
        </form>
        <p class="text-center mt-4 text-sm text-gray-500">Social Workers & NGO accounts require Admin Approval.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Config (Use your provided config here)
        const firebaseConfig = {
            apiKey: "AIzaSyAcRrP84P49zsiYXueF1K_orf_35v3-Re4",
            authDomain: "peoplemitra-90a0b.firebaseapp.com",
            projectId: "peoplemitra-90a0b",
            storageBucket: "peoplemitra-90a0b.firebasestorage.app",
            messagingSenderId: "512986064713",
            appId: "1:512986064713:web:c9fbd2684fced7d6021c98"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const name = document.getElementById('regName').value;
            const role = document.getElementById('regRole').value;

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", res.user.uid), {
                    name, email, role,
                    isVerified: (role === 'normal'), // Normal users auto-verified, others need admin
                    uid: res.user.uid
                });
                alert("Account created successfully!");
                window.location.href = "index.html";
            } catch (err) { alert(err.message); }
        });
    </script>
</body>
</html>
